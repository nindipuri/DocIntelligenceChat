# Render Blueprint - place in repo root. Deploy via Render Dashboard > New > Blueprint.
services:
  - type: web
    name: docintelligencechat-api
    env: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gpt-4o-mini
      - key: MAX_CONTEXT_PAGES
        value: "5"
